sentence=Dependency-free, heap-free, streaming serializer for the SofaBuffers (Sofab) wire format.
paragraph=Streaming C99/C++20 implementation of the SofaBuffers (Sofab) serialization format. Packs structured fields into a caller-owned buffer and decodes them through a callback-driven decoder, with no allocator and no third-party dependencies — a good fit for AVR / Cortex-M and other memory-constrained MCUs. Use #include <sofab/sofab.h> for the C API or #include <sofab/sofab.hpp> for the C++20 wrapper.
category=Data Processing
