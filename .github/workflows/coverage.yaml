name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake gcovr jq

      - name: Configure with CMake
        # Strict UTF-8 defaults OFF in this footprint corelib (CORELIB_PLAN §6.4);
        # enable it here so utf8.c (the validator) and the strict decode/encode
        # paths are compiled in and counted, and the utf8 unit tests + negative
        # vectors run under coverage.
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSOFAB_ENABLE_COVERAGE=ON \
            -DSOFAB_ENABLE_STRICT_UTF8=ON

      - name: Build project
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose

      - name: Test coverage report
        run: |
          gcovr \
            --root . \
            --filter '^src/.*\.(c|h)$' \
            --exclude-directories '.*/_deps/.*' \
            --object-directory build \
            --print-summary

      - name: Test coverage badge JSON
        run: |
          gcovr \
            --root . \
            --filter '^src/.*\.(c|h)$' \
            --exclude-directories '.*/_deps/.*' \
            --object-directory build \
            --json-summary coverage.json
          jq -n --argjson cov "$(<coverage.json)" '
            ($cov.line_covered / $cov.line_total * 100) as $pct |
            {
              schemaVersion: 1,
              label: "gcovr",
              message: ($pct | tostring[0:4] + "%"),
              color: (if $pct >= 90 then "brightgreen" elif $pct >= 75 then "yellow" else "red" end)
            }
          ' > badge.json
          echo "$(<badge.json)"

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir badge-out
          cp badge.json badge-out/coverage-c.json
          cd badge-out
          git init -q
          git checkout -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-c.json
          git commit -q -m "ci: update C coverage badge"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
