name: "Matrix: C++ features"

# The C feature matrix (build-feature-matrix.yaml) builds SOFAB_ENABLE_CPP=OFF
# and only exercises the C core. This workflow closes that gap for the C++
# wrapper (sofab.hpp): the wrapper calls flag-gated C functions, so a disabled
# capability must be reflected in the wrapper too, or it would emit calls to
# functions the core no longer declares.
#
# The wrapper splits capabilities into two kinds (see sofab.hpp):
#   - Type-dispatch (FP64, INT64, ARRAY): degrade gracefully — using the type
#     yields a static_assert, but the header still compiles and the smoke (which
#     avoids those types) builds and round-trips. These are the "graceful" jobs.
#   - Structural (FIXLEN, SEQUENCE): the wrapper rejects the build with a #error,
#     because strings/blobs/floats and the nested-message API underpin it. These
#     are the "rejected" jobs, which assert the #error fires.
#
# The full Catch2 unit tests stay max-only (build-gcc-x86_64 / build-clang-x86_64);
# they use every type and cannot compile in reduced configs by design.
#
# Each job installs its toolchain once and captures the arch-specific CMake flags
# in $CM_ARGS / $RUN, so every feature configuration is a separate, cheap step.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- configs the wrapper supports gracefully: build + run the smoke ---
  graceful:
    runs-on: ubuntu-latest
    name: graceful (${{ matrix.arch }})

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, powerpc-be]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install dependencies (PowerPC big-endian + qemu)
        if: matrix.arch == 'powerpc-be'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-powerpc-linux-gnu cmake make qemu-user-static

      - name: Arch CMake flags
        run: |
          if [ "${{ matrix.arch }}" = powerpc-be ]; then
            echo "CM_ARGS=-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=powerpc \
              -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
              -DCMAKE_BUILD_TYPE=Release -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF \
              -DSOFAB_ENABLE_CPP_SMOKE=ON -DCMAKE_EXE_LINKER_FLAGS=-static" >> "$GITHUB_ENV"
            echo "RUN=qemu-ppc-static" >> "$GITHUB_ENV"
          else
            echo "CM_ARGS=-DCMAKE_BUILD_TYPE=Debug -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF \
              -DSOFAB_ENABLE_CPP_SMOKE=ON" >> "$GITHUB_ENV"
            echo "RUN=" >> "$GITHUB_ENV"
          fi

      - name: max
        run: |
          cmake -S . -B build/max $CM_ARGS -DCMAKE_C_FLAGS="" -DCMAKE_CXX_FLAGS=""
          cmake --build build/max --target sofab_cpp_smoke
          $RUN ./build/max/test/cpp-smoke/sofab_cpp_smoke

      - name: no-fp64
        run: |
          cmake -S . -B build/no-fp64 $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FP64_SUPPORT" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_FP64_SUPPORT"
          cmake --build build/no-fp64 --target sofab_cpp_smoke
          $RUN ./build/no-fp64/test/cpp-smoke/sofab_cpp_smoke

      - name: no-int64
        run: |
          cmake -S . -B build/no-int64 $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_INT64_SUPPORT" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_INT64_SUPPORT"
          cmake --build build/no-int64 --target sofab_cpp_smoke
          $RUN ./build/no-int64/test/cpp-smoke/sofab_cpp_smoke

      - name: no-array
        run: |
          cmake -S . -B build/no-array $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_ARRAY_SUPPORT" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_ARRAY_SUPPORT"
          cmake --build build/no-array --target sofab_cpp_smoke
          $RUN ./build/no-array/test/cpp-smoke/sofab_cpp_smoke

      - name: no-overflow
        run: |
          cmake -S . -B build/no-overflow $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK"
          cmake --build build/no-overflow --target sofab_cpp_smoke
          $RUN ./build/no-overflow/test/cpp-smoke/sofab_cpp_smoke

  # --- configs the wrapper rejects: assert the #error fires at compile time ---
  rejected:
    runs-on: ubuntu-latest
    name: rejected

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: no-fixlen (expect FIXLEN #error)
        run: |
          cmake -S . -B build/no-fixlen \
            -DCMAKE_BUILD_TYPE=Debug -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF -DSOFAB_ENABLE_CPP_SMOKE=ON \
            -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT"
          if out=$(cmake --build build/no-fixlen --target sofab_cpp_smoke 2>&1); then
            echo "$out"; echo "::error::Expected the C++ wrapper build to fail, but it succeeded."; exit 1
          fi
          echo "$out"
          echo "$out" | grep -qF "requires FIXLEN support" \
            || { echo "::error::Build failed, but not with the expected #error."; exit 1; }
          echo "OK: build rejected with the expected #error."

      - name: no-sequence (expect SEQUENCE #error)
        run: |
          cmake -S . -B build/no-sequence \
            -DCMAKE_BUILD_TYPE=Debug -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF -DSOFAB_ENABLE_CPP_SMOKE=ON \
            -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_SEQUENCE_SUPPORT" -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_SEQUENCE_SUPPORT"
          if out=$(cmake --build build/no-sequence --target sofab_cpp_smoke 2>&1); then
            echo "$out"; echo "::error::Expected the C++ wrapper build to fail, but it succeeded."; exit 1
          fi
          echo "$out"
          echo "$out" | grep -qF "requires SEQUENCE support" \
            || { echo "::error::Build failed, but not with the expected #error."; exit 1; }
          echo "OK: build rejected with the expected #error."

      - name: minimal (expect FIXLEN #error)
        run: |
          cmake -S . -B build/minimal \
            -DCMAKE_BUILD_TYPE=Debug -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF -DSOFAB_ENABLE_CPP_SMOKE=ON \
            -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT -DSOFAB_DISABLE_ARRAY_SUPPORT -DSOFAB_DISABLE_SEQUENCE_SUPPORT -DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK" \
            -DCMAKE_CXX_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT -DSOFAB_DISABLE_ARRAY_SUPPORT -DSOFAB_DISABLE_SEQUENCE_SUPPORT -DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK"
          if out=$(cmake --build build/minimal --target sofab_cpp_smoke 2>&1); then
            echo "$out"; echo "::error::Expected the C++ wrapper build to fail, but it succeeded."; exit 1
          fi
          echo "$out"
          echo "$out" | grep -qF "requires FIXLEN support" \
            || { echo "::error::Build failed, but not with the expected #error."; exit 1; }
          echo "OK: build rejected with the expected #error."
