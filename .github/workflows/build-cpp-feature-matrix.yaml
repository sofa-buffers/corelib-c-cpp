name: "Matrix: C++ features"

# The C feature matrix (build-feature-matrix.yaml) builds SOFAB_ENABLE_CPP=OFF
# and only exercises the C core. This workflow closes that gap for the C++
# wrapper (sofab.hpp): the wrapper calls flag-gated C functions, so a disabled
# capability must be reflected in the wrapper too, or it would emit calls to
# functions the core no longer declares.
#
# The wrapper splits capabilities into two kinds (see sofab.hpp):
#   - Type-dispatch (FP64, INT64, ARRAY): degrade gracefully — using the type
#     yields a static_assert, but the header still compiles and the smoke (which
#     avoids those types) builds and round-trips. These are the "graceful" jobs.
#   - Structural (FIXLEN, SEQUENCE): the wrapper rejects the build with a #error,
#     because strings/blobs/floats and the nested-message API underpin it. These
#     are the "rejected" jobs, which assert the #error fires.
#
# The full Catch2 unit tests stay max-only (build-gcc-x86_64 / build-clang-x86_64);
# they use every type and cannot compile in reduced configs by design.
#
# Each job installs its toolchain once and loops over the feature configs (the
# graceful job's matrix axis is the target arch), instead of one job per config.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- configs the wrapper supports gracefully: build + run the smoke ---
  graceful:
    runs-on: ubuntu-latest
    name: graceful (${{ matrix.arch }})

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, powerpc-be]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install dependencies (PowerPC big-endian + qemu)
        if: matrix.arch == 'powerpc-be'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-powerpc-linux-gnu cmake make qemu-user-static

      - name: Build and run every graceful config
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          # name|C/C++ flags
          configs=(
            "max|"
            "no-fp64|-DSOFAB_DISABLE_FP64_SUPPORT"
            "no-int64|-DSOFAB_DISABLE_INT64_SUPPORT"
            "no-array|-DSOFAB_DISABLE_ARRAY_SUPPORT"
            "no-overflow|-DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK"
          )

          for entry in "${configs[@]}"; do
            name="${entry%%|*}"; flags="${entry#*|}"
            echo "::group::$name ($ARCH)"

            if [ "$ARCH" = powerpc-be ]; then
              cmake -S . -B "build/$name" \
                -DCMAKE_SYSTEM_NAME=Linux \
                -DCMAKE_SYSTEM_PROCESSOR=powerpc \
                -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc \
                -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
                -DCMAKE_BUILD_TYPE=Release \
                -DSOFAB_ENABLE_CPP=OFF \
                -DSOFAB_ENABLE_BENCH=OFF \
                -DSOFAB_ENABLE_CPP_SMOKE=ON \
                -DCMAKE_EXE_LINKER_FLAGS="-static" \
                -DCMAKE_C_FLAGS="$flags" \
                -DCMAKE_CXX_FLAGS="$flags"
            else
              cmake -S . -B "build/$name" \
                -DCMAKE_BUILD_TYPE=Debug \
                -DSOFAB_ENABLE_CPP=OFF \
                -DSOFAB_ENABLE_BENCH=OFF \
                -DSOFAB_ENABLE_CPP_SMOKE=ON \
                -DCMAKE_C_FLAGS="$flags" \
                -DCMAKE_CXX_FLAGS="$flags"
            fi

            cmake --build "build/$name" --target sofab_cpp_smoke

            if [ "$ARCH" = powerpc-be ]; then
              qemu-ppc-static "build/$name/test/cpp-smoke/sofab_cpp_smoke"
            else
              "build/$name/test/cpp-smoke/sofab_cpp_smoke"
            fi

            echo "::endgroup::"
          done

  # --- configs the wrapper rejects: assert the #error fires at compile time ---
  rejected:
    runs-on: ubuntu-latest
    name: rejected

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Assert every rejected config fails with a clear #error
        run: |
          set -euo pipefail

          # name|C/C++ flags|expected #error text
          configs=(
            "no-fixlen|-DSOFAB_DISABLE_FIXLEN_SUPPORT|requires FIXLEN support"
            "no-sequence|-DSOFAB_DISABLE_SEQUENCE_SUPPORT|requires SEQUENCE support"
            "minimal|-DSOFAB_DISABLE_FIXLEN_SUPPORT -DSOFAB_DISABLE_ARRAY_SUPPORT -DSOFAB_DISABLE_SEQUENCE_SUPPORT -DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK|requires FIXLEN support"
          )

          for entry in "${configs[@]}"; do
            IFS='|' read -r name flags expect <<< "$entry"
            echo "::group::$name (reject)"

            cmake -S . -B "build/$name" \
              -DCMAKE_BUILD_TYPE=Debug \
              -DSOFAB_ENABLE_CPP=OFF \
              -DSOFAB_ENABLE_BENCH=OFF \
              -DSOFAB_ENABLE_CPP_SMOKE=ON \
              -DCMAKE_C_FLAGS="$flags" \
              -DCMAKE_CXX_FLAGS="$flags"

            set +e
            out=$(cmake --build "build/$name" --target sofab_cpp_smoke 2>&1)
            status=$?
            set -e
            echo "$out"

            if [ $status -eq 0 ]; then
              echo "::error::Expected the C++ wrapper build to fail for $name, but it succeeded."
              exit 1
            fi
            if ! echo "$out" | grep -qF "$expect"; then
              echo "::error::Build failed for $name, but not with the expected #error (\"$expect\")."
              exit 1
            fi
            echo "OK: $name build rejected with the expected #error."

            echo "::endgroup::"
          done
