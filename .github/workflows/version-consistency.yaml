name: "Version consistency"

# The git tag is the source of truth for the version: every package manifest
# and the CMake project() version must match it. Each config is checked in its
# own step. On branch/PR runs the latest tag is used as the reference.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need tags for the reference version

      - name: Reference version (git tag)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            ref_version=${GITHUB_REF_NAME#v}
          else
            # Latest tag on branch/PR runs; empty if the repo has no tags yet,
            # in which case the version comparison is skipped (name/license only).
            ref_version=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || true)
            [[ -n "$ref_version" ]] || echo "::notice::no git tag found; skipping version comparison"
          fi
          {
            echo "REF_VERSION=$ref_version"
          } >> "$GITHUB_ENV"

      - name: Check Conan (conanfile.py)
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          get() { grep -oP "^\s*$1\s*=\s*\"\K[^\"]+" conanfile.py | head -1; }
          version=$(get version)
          [[ -z "$REF_VERSION" || "$version" == "$REF_VERSION" ]] || { echo "::error::conanfile.py version: '$version' != '$REF_VERSION'"; exit 1; }
          # conanfile.py is the source of truth for name/license; publish for later steps.
          {
            echo "REF_NAME=$(get name)"
            echo "REF_LICENSE=$(get license)"
          } >> "$GITHUB_ENV"

      - name: Check PlatformIO (library.json)
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          check() { [[ -z "$3" || "$2" == "$3" ]] || { echo "::error::library.json $1: '$2' != '$3'"; exit 1; }; }
          check version "$(jq -r .version library.json)"  "$REF_VERSION"
          check name    "$(jq -r .name library.json)"     "$REF_NAME"
          check license "$(jq -r .license library.json)"  "$REF_LICENSE"

      - name: Check Arduino (library.properties)
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          get() { grep -oP "^$1=\K.*" library.properties; }
          check() { [[ -z "$3" || "$2" == "$3" ]] || { echo "::error::library.properties $1: '$2' != '$3'"; exit 1; }; }
          check version "$(get version)"  "$REF_VERSION"
          check name    "$(get name)"     "$REF_NAME"
          check license "$(get license)"  "$REF_LICENSE"

      - name: Check CMake (CMakeLists.txt)
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          # project() VERSION lives on its own line; feeds the install config's
          # package-version file, so it must always be present and in lockstep.
          version=$(grep -oP '^\s*VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | head -1)
          [[ -n "$version" ]] || { echo "::error::CMakeLists.txt: no project() VERSION found"; exit 1; }
          [[ -z "$REF_VERSION" || "$version" == "$REF_VERSION" ]] || { echo "::error::CMakeLists.txt version: '$version' != '$REF_VERSION'"; exit 1; }
