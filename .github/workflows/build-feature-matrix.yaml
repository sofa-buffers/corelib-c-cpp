name: "Matrix: C features"

# Builds the standalone conformance-vector runner under each feature
# configuration and runs it. The runner skips vectors that need a capability the
# build was compiled without (each vector declares its "requires" tags), so the
# union of these configs exercises the encoder/decoder across every SOFAB_DISABLE_*
# combination. Each configuration is run on a little-endian (x86_64) and a
# big-endian (PowerPC, under qemu) target, so byte-order handling is covered for
# every feature set — including the 32-bit (no-int64) mode the native cross-arch
# jobs don't reach. The hand-written unit tests run separately, only in the full
# (max) build — see build-gcc-x86_64 / build-clang-x86_64.
#
# The matrix axis is the target arch (which decides the toolchain); the toolchain
# is installed once and the arch-specific CMake flags are captured in $CM_ARGS /
# $RUN, so each feature configuration is a separate, cheap step.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  vectors:
    runs-on: ubuntu-latest
    name: ${{ matrix.arch }}

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, powerpc-be]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          # Drop pre-installed third-party apt repos (microsoft/azure) whose
          # InRelease signatures intermittently break `apt-get update` on the runner;
          # every package below comes from the standard Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install dependencies (PowerPC big-endian + qemu)
        if: matrix.arch == 'powerpc-be'
        run: |
          # Drop pre-installed third-party apt repos (microsoft/azure) whose
          # InRelease signatures intermittently break `apt-get update` on the runner;
          # every package below comes from the standard Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc-linux-gnu cmake make qemu-user-static

      - name: Arch CMake flags
        run: |
          if [ "${{ matrix.arch }}" = powerpc-be ]; then
            echo "CM_ARGS=-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=powerpc \
              -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc -DCMAKE_BUILD_TYPE=Release \
              -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF -DCMAKE_EXE_LINKER_FLAGS=-static" >> "$GITHUB_ENV"
            echo "RUN=qemu-ppc-static" >> "$GITHUB_ENV"
          else
            echo "CM_ARGS=-DCMAKE_BUILD_TYPE=Debug -DSOFAB_ENABLE_CPP=OFF -DSOFAB_ENABLE_BENCH=OFF" >> "$GITHUB_ENV"
            echo "RUN=" >> "$GITHUB_ENV"
          fi

      # Build only the flag-tolerant vector runner: the hand-written unit tests
      # are intentionally max-only and would not compile in reduced configs.
      - name: max
        run: |
          cmake -S . -B build/max $CM_ARGS -DCMAKE_C_FLAGS=""
          cmake --build build/max --target sofab_vectortest
          $RUN ./build/max/test/c/sofab_vectortest

      - name: no-fp64
        run: |
          cmake -S . -B build/no-fp64 $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FP64_SUPPORT"
          cmake --build build/no-fp64 --target sofab_vectortest
          $RUN ./build/no-fp64/test/c/sofab_vectortest

      - name: no-int64
        run: |
          cmake -S . -B build/no-int64 $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_INT64_SUPPORT"
          cmake --build build/no-int64 --target sofab_vectortest
          $RUN ./build/no-int64/test/c/sofab_vectortest

      - name: no-array
        run: |
          cmake -S . -B build/no-array $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_ARRAY_SUPPORT"
          cmake --build build/no-array --target sofab_vectortest
          $RUN ./build/no-array/test/c/sofab_vectortest

      - name: no-sequence
        run: |
          cmake -S . -B build/no-sequence $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_SEQUENCE_SUPPORT"
          cmake --build build/no-sequence --target sofab_vectortest
          $RUN ./build/no-sequence/test/c/sofab_vectortest

      - name: no-fixlen
        run: |
          cmake -S . -B build/no-fixlen $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT"
          cmake --build build/no-fixlen --target sofab_vectortest
          $RUN ./build/no-fixlen/test/c/sofab_vectortest

      - name: no-overflow-check
        run: |
          cmake -S . -B build/no-overflow-check $CM_ARGS -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK"
          cmake --build build/no-overflow-check --target sofab_vectortest
          $RUN ./build/no-overflow-check/test/c/sofab_vectortest

      - name: minimal
        run: |
          cmake -S . -B build/minimal $CM_ARGS \
            -DCMAKE_C_FLAGS="-DSOFAB_DISABLE_FIXLEN_SUPPORT -DSOFAB_DISABLE_ARRAY_SUPPORT -DSOFAB_DISABLE_SEQUENCE_SUPPORT -DSOFAB_DISABLE_INTEGER_OVERFLOW_CHECK"
          cmake --build build/minimal --target sofab_vectortest
          $RUN ./build/minimal/test/c/sofab_vectortest
