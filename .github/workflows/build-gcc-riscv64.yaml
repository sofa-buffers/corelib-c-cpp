name: "Build: RISC-V 64"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # Drop the pre-installed third-party apt repos (microsoft, google) whose
          # InRelease signatures intermittently break `apt-get update` on the runner.
          # They live in sources.list.d; the base Ubuntu archive (sources.list) — which
          # every package below comes from — is untouched.
          sudo rm -f /etc/apt/sources.list.d/*
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu cmake make \
            qemu-user qemu-user-static

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_SYSTEM_PROCESSOR=riscv64 \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=riscv64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build project
        run: cmake --build build

      - name: Library size
        run: size build/src/libsofabuffers.a

      - name: Verify C binary
        working-directory: build/test/c
        run: |
          file sofabtest
          readelf -h -A sofabtest

      - name: Verify C++ binary
        working-directory: build/test/cpp
        run: |
          file sofabpptest
          readelf -h -A sofabpptest

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose
