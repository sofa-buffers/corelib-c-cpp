name: "Build: AVR"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        mcu: [ atmega8 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            avr-libc gcc-avr binutils-avr cmake make

      - name: Configure with CMake (${{ matrix.mcu }})
        run: |
          cmake -S . -B build \
            -DCMAKE_SYSTEM_PROCESSOR=avr \
            -DAVR_MCU=${{ matrix.mcu }} \
            -DCMAKE_TOOLCHAIN_FILE=utils/avr/toolchain-avr.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOFAB_ENABLE_CPP=OFF \
            -DSOFAB_ENABLE_BENCH=OFF

      - name: Build project
        run: cmake --build build

      - name: Library size (${{ matrix.mcu }})
        run: size build/src/libsofabuffers.a

      - name: Verify C binary (${{ matrix.mcu }})
        working-directory: build/test/c
        run: |
          file sofabtest
          readelf -h -A sofabtest
