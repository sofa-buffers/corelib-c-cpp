name: "Build: x86_64 (GCC)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # Drop pre-installed third-party apt repos (microsoft/azure) whose
          # InRelease signatures intermittently break `apt-get update` on the runner;
          # every package below comes from the standard Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build project
        run: cmake --build build

      - name: Library size
        run: size build/src/libsofabuffers.a

      - name: Verify C binary
        working-directory: build/test/c/
        run: |
          file sofabtest
          readelf -h -A sofabtest

      - name: Verify C++ binary
        working-directory: build/test/cpp/
        run: |
          file sofabpptest
          readelf -h -A sofabpptest

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose
