name: "Build: x86_64 (GCC)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # Remove the pre-installed third-party apt sources (microsoft, google) whose
          # InRelease signatures intermittently break `apt-get update` on the runner.
          # Match by content so the base Ubuntu archive (ubuntu.sources) is kept — every
          # package below comes from it.
          sudo grep -rlE 'packages\.microsoft\.com|dl\.google\.com' /etc/apt/sources.list.d/ | sudo xargs -r rm -f
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build project
        run: cmake --build build

      - name: Library size
        run: size build/src/libsofabuffers.a

      - name: Verify C binary
        working-directory: build/test/c/
        run: |
          file sofabtest
          readelf -h -A sofabtest

      - name: Verify C++ binary
        working-directory: build/test/cpp/
        run: |
          file sofabpptest
          readelf -h -A sofabpptest

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose
