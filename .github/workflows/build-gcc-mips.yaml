name: "Build: MIPS"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # Drop pre-installed third-party apt repos (microsoft/azure) whose
          # InRelease signatures intermittently break `apt-get update` on the runner;
          # every package below comes from the standard Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mips-linux-gnu g++-mips-linux-gnu cmake make \
            qemu-user qemu-user-static

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_SYSTEM_PROCESSOR=mips \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=mips-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=mips-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build project
        run: cmake --build build

      - name: Library size
        run: size build/src/libsofabuffers.a

      - name: Verify C binary
        working-directory: build/test/c
        run: |
          file sofabtest
          readelf -h -A sofabtest

      - name: Verify C++ binary
        working-directory: build/test/cpp
        run: |
          file sofabpptest
          readelf -h -A sofabpptest

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose
